<!doctype html>
<html lang="ko" data-revision="2026-07">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'none'; font-src 'none'; connect-src 'none'; media-src 'none'; object-src 'none'; frame-src 'none'; worker-src 'none'; manifest-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    >
    <meta name="referrer" content="no-referrer">
    <title>길눈 공공서비스 연습</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#practice-main">연습 내용으로 바로 가기</a>

    <div class="practice-banner" role="note">
      <strong>연습용 화면 · 실제 기관과 연결되지 않아요</strong>
    </div>

    <header class="service-header">
      <div class="service-header__inner">
        <p class="eyebrow">오프라인 공공서비스 연습</p>
        <h1 id="service-title">연습 화면을 준비하고 있어요</h1>
        <p id="service-description" class="service-description">
          개인정보 없이 안전한 순서를 연습합니다.
        </p>
      </div>
    </header>

    <main id="practice-main" class="practice-main" tabindex="-1">
      <nav class="progress-panel" aria-label="연습 진행 단계">
        <p class="panel-label">진행 순서</p>
        <ol id="progress-list" class="progress-list"></ol>
      </nav>

      <section
        id="practice-root"
        class="practice-card"
        aria-labelledby="step-title"
        aria-live="polite"
      ></section>

      <p id="practice-status" class="practice-status" role="status" aria-live="polite">
        연습 화면을 준비하고 있어요.
      </p>
    </main>
  </body>
</html>
